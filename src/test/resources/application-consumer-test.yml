server:
  port: 0

spring:
  application:
    name: notification-service-consumer-test

  main:
    allow-bean-definition-overriding: true

  # PostgreSQL (Docker test container on port 5433)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:notification_db}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 5

  # JPA with PostgreSQL dialect
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # Flyway enabled (runs real migrations)
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Kafka configuration (Docker test container on port 9093)
  # Only bootstrap-servers and consumer.group-id are read by NotificationEventRoutes (@Value).
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9093}
    consumer:
      group-id: notification-service-consumer-test

  # Mail configuration (not used - senders are mocked)
  mail:
    host: localhost
    port: 25
    username: test
    password: test
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

  # Thymeleaf
  thymeleaf:
    cache: false

# Apache Camel
camel:
  springboot:
    name: notification-camel-consumer-test
    main-run-controller: false

# Disable Eureka for tests
eureka:
  client:
    enabled: false

# Kafka topics (must match production application.yml)
kafka:
  topics:
    invoice-processed: invoice.processed
    taxinvoice-processed: taxinvoice.processed
    pdf-generated: pdf.generated.invoice
    pdf-generated-tax-invoice: pdf.generated.tax-invoice
    pdf-signed: pdf.signed
    ebms-sent: ebms.sent
    notification-dlq: notification.dlq
    saga-lifecycle-started: saga.lifecycle.started
    saga-lifecycle-step-completed: saga.lifecycle.step-completed
    saga-lifecycle-completed: saga.lifecycle.completed
    saga-lifecycle-failed: saga.lifecycle.failed

# Application config
app:
  notification:
    enabled: true
    default-recipient: test-integration@example.com
    max-retries: 3
    retry-interval: 3600000
    processing-interval: 3600000

# Actuator (minimal for tests)
management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: health

# Task scheduling (long intervals to prevent interference)
spring.task.scheduling:
  pool:
    size: 2

# Async execution
spring.task.execution:
  pool:
    core-size: 5
    max-size: 10
    queue-capacity: 100

# Logging
logging:
  level:
    root: WARN
    com.wpanther.notification: DEBUG
    org.apache.camel: INFO
    org.apache.camel.component.kafka: DEBUG
    org.springframework.kafka: INFO
