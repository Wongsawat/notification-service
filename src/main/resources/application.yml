server:
  port: 8085

spring:
  application:
    name: notification-service

  # Database configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:notification_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # JPA configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20

  # Flyway configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Kafka configuration
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.invoice.*"

  # Mail configuration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    default-encoding: UTF-8

  # Thymeleaf template engine
  thymeleaf:
    mode: HTML
    encoding: UTF-8
    cache: false
    prefix: classpath:/templates/
    suffix: .html

# Eureka service discovery
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka/}
    enabled: ${EUREKA_ENABLED:true}
  instance:
    preferIpAddress: true
    instance-id: ${spring.application.name}:${random.value}

# Kafka topics
kafka:
  topics:
    invoice-received: invoice.received
    invoice-processed: invoice.processed
    pdf-generated: pdf.generated

# Application configuration
app:
  notification:
    enabled: ${NOTIFICATION_ENABLED:true}
    default-recipient: ${DEFAULT_RECIPIENT:admin@example.com}
    max-retries: ${MAX_RETRIES:3}
    retry-interval: ${RETRY_INTERVAL:300000}  # 5 minutes in milliseconds
    processing-interval: ${PROCESSING_INTERVAL:60000}  # 1 minute

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true

# Logging
logging:
  level:
    com.invoice.notification: DEBUG
    org.springframework.kafka: INFO
    org.springframework.mail: DEBUG
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Task scheduling
spring.task.scheduling:
  pool:
    size: 5

# Async execution
spring.task.execution:
  pool:
    core-size: 5
    max-size: 10
    queue-capacity: 100
