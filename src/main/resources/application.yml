server:
  port: 8085

spring:
  application:
    name: notification-service

  # Database configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:notification_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # JPA configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20

  # Flyway configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Kafka configuration
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.wpanther.*"

  # Mail configuration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    default-encoding: UTF-8

  # Thymeleaf template engine
  thymeleaf:
    mode: HTML
    encoding: UTF-8
    cache: ${THYMELEAF_CACHE:true}  # true by default (production), set to false for dev
    prefix: classpath:/templates/
    suffix: .html

# Apache Camel
camel:
  springboot:
    name: notification-camel
    main-run-controller: true
  dataformat:
    jackson:
      auto-discover-object-mapper: true

# Eureka service discovery
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka/}
    enabled: ${EUREKA_ENABLED:true}
  instance:
    preferIpAddress: true
    instance-id: ${spring.application.name}:${random.value}

# Kafka topics
kafka:
  topics:
    invoice-processed: invoice.processed
    taxinvoice-processed: taxinvoice.processed
    pdf-generated: pdf.generated
    pdf-signed: pdf.signed
    xml-signed: xml.signed
    ebms-sent: ebms.sent
    notification-dlq: notification.dlq
    # Document-type-specific topics for statistics (after validation)
    document-received: document.received
    tax-invoice-received: document.received.tax-invoice
    invoice-received: document.received.invoice
    receipt-received: document.received.receipt
    debit-credit-note-received: document.received.debit-credit-note
    cancellation-received: document.received.cancellation
    abbreviated-received: document.received.abbreviated

    # Saga lifecycle topics from orchestrator-service
    saga-lifecycle-started: saga.lifecycle.started
    saga-lifecycle-step-completed: saga.lifecycle.step-completed
    saga-lifecycle-completed: saga.lifecycle.completed
    saga-lifecycle-failed: saga.lifecycle.failed

# Application configuration
app:
  notification:
    enabled: ${NOTIFICATION_ENABLED:true}
    default-recipient: ${DEFAULT_RECIPIENT:admin@example.com}
    max-retries: ${MAX_RETRIES:3}
    retry-interval: ${RETRY_INTERVAL:300000}  # 5 minutes in milliseconds
    processing-interval: ${PROCESSING_INTERVAL:60000}  # 1 minute
    stale-sending-timeout-ms: ${STALE_SENDING_TIMEOUT_MS:300000}  # mark SENDING as stale after 5 min
    stale-sending-check-interval: ${STALE_SENDING_CHECK_INTERVAL:120000}  # check every 2 min

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true

# Logging
logging:
  level:
    com.wpanther.notification: DEBUG
    org.apache.camel: INFO
    org.apache.camel.component.kafka: DEBUG
    org.springframework.mail: DEBUG
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Task scheduling
spring.task.scheduling:
  pool:
    size: 5

# Async execution
spring.task.execution:
  pool:
    core-size: ${ASYNC_CORE_SIZE:10}
    max-size: ${ASYNC_MAX_SIZE:20}
    queue-capacity: 100
